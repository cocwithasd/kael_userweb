<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">KAEL | Haute Parfumerie</title>
    <meta name="description" content="KAEL Signature Perfumes" id="dynamic-desc">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --surface: #111; --text: #fff; --gold: #c5a059; --muted: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        /* Nav */
        header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #222; }
        .logo img { height: 24px; display: block; }
        .nav-actions button { background: none; border: none; color: #fff; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-left: 20px; }
        .nav-actions button:hover { color: var(--gold); }

        /* Cinematic Hero */
        .hero { height: 100vh; background: linear-gradient(to bottom, rgba(0,0,0,0.3), #000), url('https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=2000') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-family: 'Times New Roman', serif; font-size: clamp(3rem, 8vw, 6rem); letter-spacing: 12px; margin-bottom: 20px; text-transform: uppercase; font-weight: 300;}
        .hero p { color: var(--muted); letter-spacing: 3px; margin-bottom: 40px; max-width: 600px; line-height: 1.6; }
        .btn-outline { border: 1px solid var(--gold); color: var(--gold); background: transparent; padding: 15px 40px; text-transform: uppercase; letter-spacing: 3px; cursor: pointer; font-size: 0.75rem; transition: 0.3s;}
        .btn-outline:hover { background: var(--gold); color: #000; }

        /* Grid */
        .section-title { text-align: center; font-family: 'Times New Roman', serif; font-size: 2rem; letter-spacing: 4px; margin: 100px 0 50px; text-transform: uppercase; font-weight: 300;}
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding: 0 5% 100px; max-width: 1400px; margin: 0 auto; }
        .card { text-align: center; }
        .card img { width: 100%; aspect-ratio: 4/5; object-fit: cover; background: var(--surface); margin-bottom: 20px; }
        .card h3 { font-size: 1rem; letter-spacing: 2px; font-weight: 400; text-transform: uppercase; margin-bottom: 10px; }
        .card p { color: var(--gold); margin-bottom: 15px; font-size: 0.9rem; }
        .add-btn { width: 100%; padding: 12px; background: #222; color: #fff; border: none; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; cursor: pointer; }
        .add-btn:hover { background: #fff; color: #000; }

        /* Cart Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .cart-panel { position: absolute; right: -100%; top: 0; bottom: 0; width: 100%; max-width: 400px; background: var(--surface); padding: 40px 30px; transition: 0.4s; display: flex; flex-direction: column; border-left: 1px solid #222;}
        .overlay.active .cart-panel { right: 0; }
        
        .cart-header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .cart-header h2 { font-family: 'Times New Roman', serif; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.85rem; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        .checkout-zone { border-top: 1px solid #333; padding-top: 20px; }
        .pin-check { display: flex; gap: 10px; margin-bottom: 20px; }
        .pin-check input { flex: 1; padding: 12px; background: #000; border: 1px solid #333; color: white; outline: none; }
        .btn-fill { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="https://ejjcjskseatjqdoxabhm.supabase.co/storage/v1/object/public/store-assets/KAEL-R-White.png" alt="KAEL">
        </div>
        <div class="nav-actions">
            <button onclick="document.getElementById('shop').scrollIntoView()">Shop</button>
            <button onclick="toggleCart()" id="cart-counter">Bag (0)</button>
        </div>
    </header>

    <div class="hero">
        <h1>L'Obscurité</h1>
        <p>A cinematic exploration of rare botanicals and smoked woods.</p>
        <button class="btn-outline" onclick="document.getElementById('shop').scrollIntoView()">Explore</button>
    </div>

    <h2 class="section-title" id="shop">The Collection</h2>
    <div class="grid" id="product-grid"></div>

    <div class="overlay" id="cart-modal">
        <div class="cart-panel">
            <div class="cart-header">
                <h2>Your Bag</h2>
                <button style="background:none; border:none; color:#888; font-size:1.5rem; cursor:pointer;" onclick="toggleCart()">✕</button>
            </div>
            
            <div class="cart-items" id="cart-list">
                <p style="color:var(--muted); font-size:0.8rem;">Your bag is empty.</p>
            </div>
            
            <div class="checkout-zone">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:bold;">
                    <span>Subtotal</span><span id="cart-total">₹0</span>
                </div>
                
                <div class="pin-check">
                    <input type="text" id="check-pin" placeholder="ENTER DELIVERY PIN" maxlength="6">
                    <button class="btn-outline" style="padding: 0 15px;" onclick="verifyPin()">Verify</button>
                </div>
                <div id="pin-msg" style="font-size:0.75rem; font-weight:bold; margin-bottom: 20px;"></div>

                <button class="btn-fill">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = 'https://ejjcjskseatjqdoxabhm.supabase.co';
        const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqamNqc2tzZWF0anFkb3hhYmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjY0ODMsImV4cCI6MjA5NjQ0MjQ4M30.tCxYq9BWtU48m4mDI30Bf3-2temFzLW7qnpCG25nKBk';
        let supabase;
        let sysConfig = null;
        let cartData = [];

        document.addEventListener('DOMContentLoaded', () => {
            if(window.supabase) init(); else setTimeout(init, 100);
        });

        async function init() {
            supabase = window.supabase.createClient(DB_URL, DB_KEY);
            
            // Apply SEO and Config
            const { data: cfg } = await supabase.from('store_settings').select('*').single();
            if(cfg) {
                sysConfig = cfg;
                if(cfg.seo_title) document.getElementById('dynamic-title').innerText = cfg.seo_title;
                if(cfg.seo_description) document.getElementById('dynamic-desc').content = cfg.seo_description;
            }

            // Render Products
            const { data: prods } = await supabase.from('products').select('*').eq('is_archived', false);
            if(prods) {
                document.getElementById('product-grid').innerHTML = prods.map(p => `
                    <div class="card">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/400x500/111/fff?text=KAEL'}" alt="${p.title}">
                        <h3>${p.title}</h3>
                        <p>₹${p.price.toLocaleString('en-IN')}</p>
                        <button class="add-btn" onclick="addToBag('${p.title}', ${p.price})">Add to Bag</button>
                    </div>
                `).join('');
            }
        }

        function toggleCart() {
            const el = document.getElementById('cart-modal');
            el.classList.toggle('active');
        }

        window.addToBag = function(title, price) {
            cartData.push({title, price});
            renderCart();
            toggleCart();
        }

        window.removeBagItem = function(idx) {
            cartData.splice(idx, 1);
            renderCart();
        }

        function renderCart() {
            document.getElementById('cart-counter').innerText = `Bag (${cartData.length})`;
            const list = document.getElementById('cart-list');
            
            if(cartData.length === 0) {
                list.innerHTML = '<p style="color:var(--muted); font-size:0.8rem;">Your bag is empty.</p>';
                document.getElementById('cart-total').innerText = '₹0';
                return;
            }

            let total = 0;
            list.innerHTML = cartData.map((item, idx) => {
                total += item.price;
                return `
                <div class="cart-item">
                    <span>${item.title}</span>
                    <div><span style="color:var(--gold); margin-right:15px;">₹${item.price.toLocaleString('en-IN')}</span>
                    <span style="color:red; cursor:pointer;" onclick="removeBagItem(${idx})">✕</span></div>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = `₹${total.toLocaleString('en-IN')}`;
        }

        window.verifyPin = function() {
            const pin = document.getElementById('check-pin').value.trim();
            const msg = document.getElementById('pin-msg');
            if(pin.length !== 6) { msg.style.color = "#ef4444"; msg.innerText = "Enter valid 6-digit PIN"; return; }

            const panIndia = sysConfig ? sysConfig.pan_india_delivery : true;
            const pins = sysConfig?.allowed_pincodes || [];

            if(panIndia || pins.includes(pin)) {
                msg.style.color = "#10b981"; msg.innerText = "✓ Delivery Available";
            } else {
                msg.style.color = "#ef4444"; msg.innerText = "✕ Not Serviceable";
            }
        }
    </script>
</body>
</html>
