<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAEL | Haute Parfumerie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #F5F5F5; }
        .serif-title { font-family: 'Cormorant Garamond', serif; }
        header.compact { padding-top: 0.75rem; padding-bottom: 0.75rem; background-color: rgba(5, 5, 5, 0.90); backdrop-filter: blur(16px); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .hero-slide { transition: opacity 1.5s ease-in-out; }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="toast-container" class="fixed top-24 right-6 z-[100] flex flex-col space-y-3 pointer-events-none"></div>

    <header id="main-header" class="fixed top-0 left-0 w-full z-50 transition-all duration-500 px-6 py-4 md:py-6 flex justify-between items-center bg-transparent">
        <a href="#" onclick="navigateTo('home'); return false;" class="flex items-center">
            <img src="https://ejjcjskseatjqdoxabhm.supabase.co/storage/v1/object/public/store-assets/kael_weblogo.png" alt="KAEL Logo" class="h-6 md:h-8 object-contain transition-all duration-300">
        </a>
        <nav class="hidden md:flex space-x-10 text-[13px] uppercase tracking-widest font-medium text-gray-300">
            <a href="#" onclick="navigateTo('home'); return false;" class="hover:text-amber-400 transition-colors">Products</a>
            <a href="#" onclick="navigateTo('about'); return false;" class="hover:text-amber-400 transition-colors">About</a>
            <a href="#" onclick="navigateTo('contact'); return false;" class="hover:text-amber-400 transition-colors">Contact</a>
        </nav>
        <div class="flex items-center space-x-4 md:space-x-6">
            <button id="auth-btn-desktop" onclick="handleAuthClick()" class="hidden md:block text-[11px] font-bold tracking-widest uppercase border border-white/20 px-5 py-2 rounded hover:bg-white hover:text-black transition-all">Login</button>
            <button id="auth-btn-mobile" onclick="handleAuthClick()" class="md:hidden p-1 text-gray-300 hover:text-amber-400 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></button>
            <button onclick="toggleCart()" class="relative p-1 text-gray-300 hover:text-amber-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span id="cart-count" class="absolute -top-1 -right-2 bg-amber-500 text-black text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center hidden">0</span>
            </button>
            <button class="md:hidden p-1 focus:outline-none hover:text-amber-400" onclick="toggleMobileMenu()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
        </div>
    </header>

    <div id="mobile-menu" class="fixed inset-0 bg-[#050505]/95 backdrop-blur-md z-50 transform translate-x-full transition-transform duration-300 p-8 flex flex-col justify-between hidden">
        <div>
            <div class="flex justify-between items-center mb-12">
                <img src="https://ejjcjskseatjqdoxabhm.supabase.co/storage/v1/object/public/store-assets/kael_weblogo.png" class="h-6 object-contain">
                <button onclick="toggleMobileMenu()" class="text-white hover:text-amber-400 transition-colors"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <nav class="flex flex-col space-y-6 text-xl md:text-2xl uppercase tracking-wider font-light mt-12">
                <a href="#" onclick="navigateTo('home'); toggleMobileMenu(); return false;" class="hover:text-amber-400 transition-colors">Products</a>
                <a href="#" onclick="navigateTo('about'); toggleMobileMenu(); return false;" class="hover:text-amber-400 transition-colors">Our Story</a>
                <a href="#" onclick="navigateTo('contact'); toggleMobileMenu(); return false;" class="hover:text-amber-400 transition-colors">Support</a>
                <div class="pt-8 space-y-4 border-t border-white/5">
                    <a href="#" onclick="navigateTo('policy-privacy'); toggleMobileMenu(); return false;" class="block text-xs text-gray-500 hover:text-white uppercase tracking-widest">Privacy Policy</a>
                    <a href="#" onclick="navigateTo('policy-return'); toggleMobileMenu(); return false;" class="block text-xs text-gray-500 hover:text-white uppercase tracking-widest">Returns & Replacements</a>
                </div>
            </nav>
        </div>
    </div>

    <main id="view-content" class="min-h-screen pb-12"></main>

    <footer class="border-t border-white/5 bg-[#030303] py-16 px-6 text-sm text-gray-400">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12">
            <div>
                <h3 class="text-white uppercase tracking-widest font-semibold mb-6 text-[11px]">KAEL</h3>
                <p id="dyn-footer-desc" class="text-xs leading-relaxed text-gray-500"></p>
                <div id="dyn-footer-socials" class="flex items-center space-x-4 mt-6"></div>
            </div>
            <div>
                <h3 class="text-white uppercase tracking-widest font-semibold mb-6 text-[11px]">Support</h3>
                <ul class="space-y-3 text-xs text-gray-500">
                    <li><a href="#" onclick="navigateTo('contact'); return false;" class="hover:text-amber-400 transition-colors">Contact Us</a></li>
                    <li><a href="#" onclick="navigateTo('about'); return false;" class="hover:text-amber-400 transition-colors">About Us</a></li>
                </ul>
            </div>
            <div>
                <h3 class="text-white uppercase tracking-widest font-semibold mb-6 text-[11px]">Legal</h3>
                <ul class="space-y-3 text-xs text-gray-500">
                    <li><a href="#" onclick="navigateTo('policy-privacy'); return false;" class="hover:text-amber-400 transition-colors">Privacy Policy</a></li>
                    <li><a href="#" onclick="navigateTo('policy-return'); return false;" class="hover:text-amber-400 transition-colors">Returns Policy</a></li>
                    <li><a href="#" onclick="navigateTo('policy-cancellation'); return false;" class="hover:text-amber-400 transition-colors">Cancellations</a></li>
                </ul>
            </div>
            <div>
                <h3 class="text-white uppercase tracking-widest font-semibold mb-6 text-[11px]">Secure Payments</h3>
                <p id="dyn-secure-text" class="text-xs mb-3 text-gray-500"></p>
            </div>
        </div>
        <div id="dyn-copyright" class="max-w-7xl mx-auto text-center border-t border-white/5 mt-16 pt-8 text-[10px] uppercase text-gray-600 tracking-widest"></div>
    </footer>

    <div id="cart-drawer" class="fixed inset-y-0 right-0 w-full max-w-md bg-[#080808] border-l border-white/5 z-50 transform translate-x-full transition-transform duration-300 p-6 flex flex-col justify-between hidden shadow-2xl">
        <div>
            <div class="flex justify-between items-center mb-8 pb-4 border-b border-white/5">
                <h2 class="uppercase tracking-widest text-[11px] text-gray-400 font-semibold">Shopping Cart</h2>
                <button onclick="toggleCart()" class="p-1 text-gray-400 hover:text-white transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div id="cart-items" class="space-y-4 max-h-[60vh] overflow-y-auto pr-2"></div>
        </div>
        <div class="border-t border-white/5 pt-6">
            <div class="flex justify-between mb-6 text-sm font-medium">
                <span class="text-gray-400 text-xs uppercase tracking-widest">Subtotal</span>
                <span id="cart-total" class="font-mono text-white tracking-wide">₹0</span>
            </div>
            <button onclick="handleCheckoutInit()" class="w-full bg-white text-black py-4 uppercase text-[11px] font-bold tracking-widest hover:bg-amber-400 transition-colors rounded">Checkout</button>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-[#0A0A0A] border border-white/10 max-w-sm w-full p-8 rounded-xl relative shadow-2xl">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <div id="auth-form-content">
                <h3 class="text-sm uppercase tracking-widest mb-2 font-semibold text-center text-white" id="auth-title">Login</h3>
                <div class="space-y-5 mt-6">
                    <div id="signup-fields" class="hidden space-y-5">
                        <div><label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2">Full Name</label><input type="text" id="auth-name" class="w-full bg-[#111] border border-white/10 rounded px-4 py-2.5 text-sm text-white outline-none focus:border-amber-400"></div>
                        <div><label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2">Phone Number</label><input type="tel" id="auth-phone" class="w-full bg-[#111] border border-white/10 rounded px-4 py-2.5 text-sm text-white outline-none focus:border-amber-400"></div>
                    </div>
                    <div id="email-field"><label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2">Email</label><input type="email" id="auth-email" class="w-full bg-[#111] border border-white/10 rounded px-4 py-2.5 text-sm text-white outline-none focus:border-amber-400"></div>
                    <div id="pw-field"><label class="block text-[10px] uppercase tracking-widest text-gray-500 mb-2">Password</label><input type="password" id="auth-password" class="w-full bg-[#111] border border-white/10 rounded px-4 py-2.5 text-sm text-white outline-none focus:border-amber-400"></div>
                    <button onclick="handleAuthAction()" id="submit-auth-btn" class="w-full bg-amber-500 text-black py-3 rounded text-[11px] font-bold uppercase tracking-widest hover:bg-amber-400 mt-2">Login</button>
                    <div id="auth-switch-wrapper" class="text-center text-[11px] text-gray-500 pt-4 border-t border-white/5">
                        <span id="auth-switch-text">Don't have an account?</span><button onclick="setAuthMode('signup')" id="auth-switch-btn" class="text-white hover:text-amber-400 ml-2 uppercase tracking-wider font-semibold">Sign Up</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ejjcjskseatjqdoxabhm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqamNqc2tzZWF0anFkb3hhYmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjY0ODMsImV4cCI6MjA5NjQ0MjQ4M30.tCxYq9BWtU48m4mDI30Bf3-2temFzLW7qnpCG25nKBk";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let globalProducts = [], heroSlidesData = [], userSavedAddresses = [], shoppingCart = [], storeConfig = {}, generalConfig = {};
        let currentUser = null, isSignUpMode = false, sliderInterval = null, pendingCheckout = false, authMode = 'login', activeCoupon = null;

        const loaderHTML = `<div class="flex flex-col items-center justify-center py-48 w-full"><img src="https://ejjcjskseatjqdoxabhm.supabase.co/storage/v1/object/public/store-assets/kael_weblogo.png" class="h-6 animate-[pulse_2s_ease-in-out_infinite] opacity-60"></div>`;
        const formatINR = (amount) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(amount);

        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 50) header.classList.add('compact'); else header.classList.remove('compact');
        });

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const borderColor = type === 'success' ? 'border-amber-500/50' : 'border-red-500/50';
            const iconColor = type === 'success' ? 'text-amber-400' : 'text-red-400';
            toast.className = `flex items-center space-x-3 p-4 bg-[#0A0A0A] border ${borderColor} rounded text-white text-xs font-mono shadow-2xl transform transition-all duration-300 translate-x-full pointer-events-auto`;
            toast.innerHTML = `<span class="${iconColor} text-lg">${type==='success'?'✓':'✕'}</span><span class="leading-relaxed">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        async function initApp() {
            try {
                await Promise.all([fetchConfig(), fetchProducts(), fetchHeroSlides(), checkSession()]);
                navigateTo('home');
            } catch(e) { console.error("Init failed:", e); }
        }

        async function fetchConfig() {
            const [ { data: store }, { data: gen } ] = await Promise.all([
                supabaseClient.from('store_settings').select('*').eq('id', 1).single(),
                supabaseClient.from('general_settings').select('*').eq('id', 1).single()
            ]);
            storeConfig = store || {}; generalConfig = gen || {};

            document.getElementById('dyn-footer-desc').innerText = generalConfig.footer_description || '';
            document.getElementById('dyn-secure-text').innerText = generalConfig.secure_systems_text || '';
            document.getElementById('dyn-copyright').innerText = generalConfig.copyright_text || '';

            let socialsHtml = '';
            if(storeConfig.social_facebook) socialsHtml += `<a href="${storeConfig.social_facebook}" class="text-gray-500 hover:text-amber-400 transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg></a>`;
            if(storeConfig.social_instagram) socialsHtml += `<a href="${storeConfig.social_instagram}" class="text-gray-500 hover:text-amber-400 transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12.315 2c2.43 0 2.784.013 3.808.06 1.064.049 1.791.218 2.427.465a4.902 4.902 0 011.772 1.153 4.902 4.902 0 011.153 1.772c.247.636.416 1.363.465 2.427.048 1.067.06 1.407.06 4.123v.08c0 2.643-.012 2.987-.06 4.043-.049 1.064-.218 1.791-.465 2.427a4.902 4.902 0 01-1.153 1.772 4.902 4.902 0 01-1.772 1.153c-.636.247-1.363.416-2.427.465-1.067.048-1.407.06-4.123.06h-.08c-2.643 0-2.987-.012-4.043-.06-1.064-.049-1.791-.218-2.427-.465a4.902 4.902 0 01-1.772-1.153 4.902 4.902 0 01-1.153-1.772c-.247-.636-.416-1.363-.465-2.427-.047-1.024-.06-1.379-.06-3.808v-.63c0-2.43.013-2.784.06-3.808.049-1.064.218-1.791.465-2.427a4.902 4.902 0 011.153-1.772A4.902 4.902 0 015.45 2.525c.636-.247 1.363-.416 2.427-.465C8.901 2.013 9.256 2 11.685 2h.63zm-.081 1.802h-.468c-2.456 0-2.784.011-3.807.058-.975.045-1.504.207-1.857.344-.467.182-.8.398-1.15.748-.35.35-.566.683-.748 1.15-.137.353-.3.882-.344 1.857-.047 1.023-.058 1.351-.058 3.807v.468c0 2.456.011 2.784.058 3.807.045.975.207 1.504.344 1.857.182.466.399.8.748 1.15.35.35.683.566 1.15.748.353.137.882.3 1.857.344 1.054.048 1.37.058 4.041.058h.08c2.597 0 2.917-.01 3.96-.058.976-.045 1.505-.207 1.858-.344a3.097 3.097 0 00-.748-1.15 3.098 3.098 0 00-1.15-.748c-.353-.137-.882-.3-1.857-.344-1.023-.047-1.351-.058-3.807-.058zM12 6.865a5.135 5.135 0 110 10.27 5.135 5.135 0 010-10.27zm0 1.802a3.333 3.333 0 100 6.666 3.333 3.333 0 000-6.666zm5.338-3.205a1.2 1.2 0 110 2.4 1.2 1.2 0 010-2.4z" clip-rule="evenodd"/></svg></a>`;
            if(storeConfig.social_youtube) socialsHtml += `<a href="${storeConfig.social_youtube}" class="text-gray-500 hover:text-amber-400 transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>`;
            if(storeConfig.social_whatsapp) socialsHtml += `<a href="${storeConfig.social_whatsapp}" class="text-gray-500 hover:text-amber-400 transition-colors"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg></a>`;
            document.getElementById('dyn-footer-socials').innerHTML = socialsHtml;
        }

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            updateAuthUI(session?.user || null);
            supabaseClient.auth.onAuthStateChange((_event, session) => updateAuthUI(session?.user || null));
        }

        function updateAuthUI(user) {
            currentUser = user;
            const btnDesktop = document.getElementById('auth-btn-desktop');
            if(user) { btnDesktop.innerText = "My Account"; } else { btnDesktop.innerText = "Login"; }
        }

        function handleAuthClick() { if(currentUser) navigateTo('account'); else { setAuthMode('login'); openAuthModal(); } }

        async function fetchProducts() { const { data } = await supabaseClient.from('products').select('*'); if (data) globalProducts = data; }
        async function fetchHeroSlides() { const { data } = await supabaseClient.from('hero_slides').select('*').eq('active', true).order('order_index', { ascending: true }); if (data) heroSlidesData = data; }

        function navigateTo(view, param = null) {
            clearInterval(sliderInterval);
            const container = document.getElementById('view-content');
            window.scrollTo({top: 0, behavior: 'smooth'});
            if (view === 'home') renderHome(container);
            else if (view === 'product') renderProductPage(container, param);
            else if (view === 'account') renderAccountPage(container);
            else if (view.startsWith('policy-')) renderPolicyPage(container, view.replace('policy-', ''));
            else if (view === 'about') renderStatic(container, 'About Us', 'KAEL designs structural olfactive memories. Established under architectural design principles, we prioritize rare components, minimalist concrete visual designs, and dynamic olfactory profiles.');
            else if (view === 'contact') renderStatic(container, 'Contact Support', `For inquiries regarding your orders or shipping:<br><br><div class="bg-[#111] p-6 border border-white/5 font-mono text-sm text-gray-400 rounded-lg"><p>Email: ${storeConfig.support_email||'support@kaelparfums.com'}</p><p>Phone: ${storeConfig.support_phone||'-'}</p></div>`);
        }

        function renderStatic(target, title, content) {
            target.innerHTML = `<div class="max-w-3xl mx-auto px-6 py-32"><h1 class="serif-title text-5xl mb-8 text-white">${title}</h1><p class="text-gray-400 leading-relaxed text-lg">${content}</p></div>`;
        }

        function renderHome(target) {
            if(globalProducts.length === 0) { target.innerHTML = loaderHTML; return; }

            let heroHTML = '';
            if(heroSlidesData.length > 0) {
                let slidesHTML = heroSlidesData.map((slide, index) => `
                    <div class="hero-slide absolute inset-0 ${index === 0 ? 'opacity-100' : 'opacity-0'} z-0">
                        <div class="absolute inset-0 bg-black/40 z-10"></div><div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-black/20 to-transparent z-10"></div>
                        <img src="${slide.image_url}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 flex flex-col justify-center items-center text-center px-6 z-20">
                            <h1 class="serif-title text-5xl md:text-7xl tracking-widest uppercase mb-4 text-white drop-shadow-2xl">${slide.title || ''}</h1>
                            <p class="text-[10px] md:text-xs tracking-[0.4em] uppercase text-amber-400 font-semibold drop-shadow-md">${slide.subtitle || ''}</p>
                        </div>
                    </div>`).join('');

        function setAuthMode(mode) {
            authMode = mode;

            const signupFields = document.getElementById('signup-fields'); const emailField = document.getElementById('email-field'); const pwField = document.getElementById('pw-field');
            const switchWrapper = document.getElementById('auth-switch-wrapper');
            signupFields.classList.add('hidden'); emailField.classList.remove('hidden'); pwField.classList.remove('hidden'); switchWrapper.classList.remove('hidden');

            if(mode === 'login') {
                title.innerText = "Login"; btn.innerText = "Login";
                document.getElementById('auth-switch-text').innerText = "New here?";
                document.getElementById('auth-switch-btn').innerText = "Create Account"; document.getElementById('auth-switch-btn').onclick = () => setAuthMode('signup');

                title.innerText = "Create Account"; btn.innerText = "Register";
                signupFields.classList.remove('hidden');
                document.getElementById('auth-switch-text').innerText = "Already registered?";

        async function handleAuthAction() {
            const email = document.getElementById('auth-email').value; const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value; const phone = document.getElementById('auth-phone').value;
            try {
                if(authMode === 'signup') {
                    if(!email || !password || !name || !phone) return showToast("All fields are required.", "error");
                    const { data, error } = await supabaseClient.auth.signUp({ email, password, options: { data: { full_name: name, phone: phone } } });
                    if(error) showToast(error.message, "error"); 
                    else { if(data.user) await supabaseClient.from('profiles').upsert({ id: data.user.id, full_name: name, phone: phone }); showToast("Registration successful. Please login."); setAuthMode('login'); }
                } else if(authMode === 'login') {
                    if(!email || !password) return showToast("Credentials missing.", "error");

            const code = document.getElementById('coupon-input').value.toUpperCase().trim();
            const msgEl = document.getElementById('coupon-msg');
            msgEl.classList.remove('hidden', 'text-green-500', 'text-red-500');

            if(!code) { msgEl.innerText = "Enter a code."; msgEl.classList.add('text-red-500'); return; }

            const { data: coupon, error } = await supabaseClient.from('coupons').select('*').eq('code', code).single();
            if (error || !coupon || !coupon.active) { msgEl.innerText = "Invalid code."; msgEl.classList.add('text-red-500'); return; }
            
            const now = new Date();
            if(coupon.valid_until && new Date(coupon.valid_until) < now) { msgEl.innerText = "Code expired."; msgEl.classList.add('text-red-500'); return; }
            if(coupon.max_uses_total && coupon.times_used >= coupon.max_uses_total) { msgEl.innerText = "Limit reached."; msgEl.classList.add('text-red-500'); return; }

            const { count: userUses } = await supabaseClient.from('coupon_usage').select('*', { count: 'exact', head: true }).eq('coupon_id', coupon.id).eq('user_id', currentUser.id);
            if(userUses >= coupon.max_uses_per_user) { msgEl.innerText = "Max uses reached."; msgEl.classList.add('text-red-500'); return; }

            let cartBaseTotal = shoppingCart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            let discountAmt = coupon.discount_type === 'FLAT' ? coupon.discount_value : cartBaseTotal * (coupon.discount_value / 100);
            if(discountAmt > cartBaseTotal) discountAmt = cartBaseTotal;

            activeCoupon = { ...coupon, calculated_discount: discountAmt };

            msgEl.innerText = `Code applied!`; msgEl.classList.add('text-green-500');
            document.getElementById('summ-discount-row').classList.remove('hidden');
            document.getElementById('summ-discount').innerText = `- ${formatINR(discountAmt)}`;
            document.getElementById('summ-total').innerText = formatINR(cartBaseTotal - discountAmt);
            document.getElementById('coupon-input').disabled = true;
        }

        function autoFillAddress(index) {
            const fields = ['ship-name','ship-phone','ship-address','ship-city','ship-state','ship-pincode'];
            if(index === "") { fields.forEach(f => document.getElementById(f).value = ""); document.getElementById('save-address-check').checked = true; return; }
            const addr = userSavedAddresses[index];
            document.getElementById('ship-name').value = addr.full_name; document.getElementById('ship-phone').value = addr.phone;
            document.getElementById('ship-address').value = addr.street_address; document.getElementById('ship-city').value = addr.city;
            document.getElementById('ship-state').value = addr.state; document.getElementById('ship-pincode').value = addr.pincode;
            document.getElementById('save-address-check').checked = false; 
        }

        async function processOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('checkout-btn'), pinError = document.getElementById('pin-error'), pincode = document.getElementById('ship-pincode').value.trim();
            const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;
            btn.innerText = "Processing..."; btn.disabled = true; pinError.classList.add('hidden');

            try {
                if(!storeConfig.allow_all_pins && !storeConfig.allowed_pins.includes(pincode)) {
                    pinError.innerText = `Delivery to ${pincode} is currently unavailable.`;
                    pinError.classList.remove('hidden'); btn.innerText = "Place Order"; btn.disabled = false; return;
                }

                let cartBaseTotal = shoppingCart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
                let final_total = activeCoupon ? cartBaseTotal - activeCoupon.calculated_discount : cartBaseTotal;

                if (paymentMethod === 'ONLINE') {
                    const rzpyResponse = await fetch('/api/create-razorpay-order', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ amount: final_total })
                    });
                    const rzpyData = await rzpyResponse.json();
                    if (!rzpyResponse.ok) throw new Error(rzpyData.error || "Failed to start payment.");

                    const options = {
                        key: storeConfig.razorpay_key_id, amount: rzpyData.amount, currency: "INR", name: "KAEL Parfums",
                        order_id: rzpyData.id, theme: { color: "#f59e0b" },
                        handler: async function (response) { await finalizeOrderPlacement(final_total, 'Razorpay (Online)'); },
                        prefill: { name: document.getElementById('ship-name').value, email: document.getElementById('ship-email').value, contact: document.getElementById('ship-phone').value }
                    };
                    const rzp = new Razorpay(options);
                    rzp.on('payment.failed', function (response){ showToast("Payment failed.", "error"); btn.innerText = "Place Order"; btn.disabled = false; });
                    rzp.open();
                } else {
                    await finalizeOrderPlacement(final_total, 'Cash On Delivery (COD)');
                }
            } catch(err) { showToast(err.message || "Checkout error.", "error"); btn.innerText = "Place Order"; btn.disabled = false; }
        }

        async function finalizeOrderPlacement(final_total, payment_method) {
            const pincode = document.getElementById('ship-pincode').value.trim();
            if(document.getElementById('save-address-check').checked) {
                await supabaseClient.from('user_addresses').insert([{ user_id: currentUser.id, full_name: document.getElementById('ship-name').value, phone: document.getElementById('ship-phone').value, street_address: document.getElementById('ship-address').value, city: document.getElementById('ship-city').value, state: document.getElementById('ship-state').value, pincode: pincode }]);
            }

            const { data: order, error: orderErr } = await supabaseClient.from('orders').insert([{
                user_id: currentUser.id, customer_name: document.getElementById('ship-name').value, customer_email: document.getElementById('ship-email').value,
                phone: document.getElementById('ship-phone').value, shipping_address: document.getElementById('ship-address').value,
                city: document.getElementById('ship-city').value, state: document.getElementById('ship-state').value, pincode: pincode,
                total_amount: final_total, discount_amount: activeCoupon ? activeCoupon.calculated_discount : 0, coupon_id: activeCoupon ? activeCoupon.id : null,
                payment_method: payment_method, order_status: payment_method.includes('Razorpay') ? 'Processing' : 'Pending'
            }]).select().single();

            if (orderErr) throw orderErr;

            if(activeCoupon) await supabaseClient.from('coupon_usage').insert([{ coupon_id: activeCoupon.id, user_id: currentUser.id, order_id: order.id }]);

            const itemsPayload = shoppingCart.map(item => ({ order_id: order.id, product_id: item.product_id, quantity: item.quantity, price_at_purchase: item.price, variation_name: item.variation_name }));
            await supabaseClient.from('order_items').insert(itemsPayload);

            fetch('/api/send-email', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ customerEmail: document.getElementById('ship-email').value, customerName: document.getElementById('ship-name').value, orderId: order.id.substring(0,8), totalAmount: formatINR(final_total) }) });

            shoppingCart = []; activeCoupon = null; updateCartCount();
            document.getElementById('view-content').innerHTML = `
                <div class="max-w-md mx-auto text-center py-32 px-6"><div class="text-amber-500 text-5xl mb-8 font-light">✓</div><h1 class="serif-title text-4xl text-white mb-4">Order Confirmed</h1><p class="text-xs font-mono text-gray-500 mb-8 border-b border-white/5 pb-8">Order ID: #${order.id.substring(0,8)}</p><p class="text-sm text-gray-400 mb-10 leading-relaxed">Your order has been placed successfully. You will receive an email confirmation shortly.</p><button onclick="navigateTo('home')" class="bg-white text-black px-8 py-3 rounded text-[10px] font-bold uppercase tracking-widest hover:bg-amber-400 transition-all">Back to Home</button></div>`;
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
