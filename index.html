<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAEL | Haute Parfumerie</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --surface-black: #050505; --surface-card: #111111; --typography-white: #ffffff; --typography-dim: #888888; --luxury-gold: #c5a059; --ui-border: #222222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        html { scroll-behavior: smooth; background: var(--surface-black); }
        body { color: var(--typography-white); min-height: 100vh; overflow-x: hidden; }
        
        /* Premium Floating Navigation Matrix */
        .luxury-header { 
            position: fixed; top: 0; width: 100%; padding: 25px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(12px); z-index: 5000;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .header-anchor { display: flex; align-items: center; }
        .header-anchor img { height: 20px; max-width: 150px; object-fit: contain; }
        
        .interactive-nav-trigger { 
            background: none; border: none; color: var(--typography-white); font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: color 0.3s;
        }
        .interactive-nav-trigger:hover { color: var(--luxury-gold); }

        /* Hero Container */
        .cinematic-hero { 
            height: 100vh; width: 100vw;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), var(--surface-black)), url('https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=2000') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px;
        }
        .cinematic-hero h1 { font-family: 'Times New Roman', serif; font-size: 4.5rem; font-weight: 300; letter-spacing: 12px; margin-bottom: 25px; text-transform: uppercase;}
        .cinematic-hero p { font-size: 0.95rem; color: var(--typography-dim); letter-spacing: 3px; margin-bottom: 45px; max-width: 650px; line-height: 1.8;}
        
        .interactive-gold-action { 
            background: transparent; color: var(--luxury-gold); border: 1px solid var(--luxury-gold); 
            padding: 18px 45px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; 
            cursor: pointer; transition: background 0.3s, color 0.3s;
        }
        .interactive-gold-action:hover { background: var(--luxury-gold); color: #000000; }

        .section-header-title { text-align: center; font-family: 'Times New Roman', serif; font-size: 2.2rem; font-weight: 300; letter-spacing: 6px; margin: 120px 0 60px; text-transform: uppercase;}
        .showcase-grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 45px; padding: 0 5% 120px; max-width: 1400px; margin: 0 auto;}
        
        .product-luxury-card { text-align: center; cursor: pointer; }
        .product-luxury-card-frame { width: 100%; height: 460px; background: var(--surface-card); object-fit: cover; border-radius: 2px; transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-luxury-card:hover .product-luxury-card-frame { transform: scale(1.02); }
        .product-luxury-details { padding-top: 25px; }
        .product-luxury-title { font-size: 0.95rem; letter-spacing: 2px; font-weight: 400; margin-bottom: 10px; text-transform: uppercase; }
        .product-luxury-price { color: var(--luxury-gold); font-size: 0.85rem; letter-spacing: 1px; }

        /* Slider Overlay Module */
        .cart-vault-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; 
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease; backdrop-filter: blur(8px);
        }
        .cart-vault-overlay.state-visible { opacity: 1; pointer-events: auto; }
        .cart-vault-panel { 
            position: absolute; right: -500px; top: 0; bottom: 0; width: 100%; max-width: 460px; 
            background: var(--surface-card); border-left: 1px solid var(--ui-border); padding: 45px; 
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column;
        }
        .cart-vault-overlay.state-visible .cart-vault-panel { right: 0; }
        
        .cart-vault-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--ui-border); padding-bottom: 25px; margin-bottom: 35px;}
        .cart-vault-header h2 { font-family: 'Times New Roman', serif; font-size: 1.6rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase;}
        .cart-vault-kill-trigger { background: none; border: none; color: var(--typography-dim); font-size: 1.3rem; cursor: pointer; }
        
        .input-matrix-group { margin-bottom: 30px; }
        .input-matrix-group label { display: block; font-size: 0.65rem; color: var(--typography-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; font-weight: 600;}
        .input-matrix-group input { width: 100%; padding: 16px; background: var(--surface-black); border: 1px solid var(--ui-border); color: white; outline: none; border-radius: 2px; font-size: 0.9rem; letter-spacing: 2px;}
        .input-matrix-group input:focus { border-color: var(--luxury-gold); }
    </style>
</head>
<body>

    <header class="luxury-header">
        <button type="button" class="interactive-nav-trigger" id="action-trigger-scroll">Collections</button>
        <div class="header-anchor">
            <img src="https://ejjcjskseatjqdoxabhm.supabase.co/storage/v1/object/public/store-assets/KAEL-R-White.png" alt="KAEL Haute Parfumerie">
        </div>
        <button type="button" class="interactive-nav-trigger" id="action-trigger-open-bag">Bag (1)</button>
    </header>

    <div class="cinematic-hero">
        <h1>L'Obscurité</h1>
        <p>A precision-crafted sensory exploration of smoked rare woods, nocturnal amber, and raw modern elegance.</p>
        <button type="button" class="interactive-gold-action" id="action-hero-discover">Discover Collection</button>
    </div>

    <h2 class="section-header-title" id="target-shop-section">Signature Formulations</h2>
    <div class="showcase-grid-layout" id="dynamic-product-injection-grid"></div>

    <div class="cart-vault-overlay" id="cart-vault-modal-element">
        <div class="cart-vault-panel">
            <div class="cart-vault-header">
                <h2>Your Selection</h2>
                <button type="button" class="cart-vault-kill-trigger" id="action-trigger-close-bag">✕</button>
            </div>
            
            <div style="flex: 1;">
                <p style="color: var(--typography-dim); font-size: 0.85rem; margin-bottom: 35px; letter-spacing: 1px;">Selected Matrix: Signature Extrait De Parfum (100ml)</p>
                
                <div class="input-matrix-group">
                    <label>Logistics Routing Verification</label>
                    <div style="display: flex; gap: 12px;">
                        <input type="text" id="target-routing-pincode" placeholder="ENTER PINCODE" maxlength="6">
                        <button type="button" class="interactive-gold-action" style="padding: 0 25px;" id="action-trigger-verify-pincode">Verify</button>
                    </div>
                    <div id="ui-routing-feedback-node" style="margin-top: 15px; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px;"></div>
                </div>
            </div>

            <button type="button" class="interactive-gold-action" style="width: 100%; background: var(--luxury-gold); color: #000000; font-weight: 700; border: none;">Proceed to Acquisition</button>
        </div>
    </div>

    <script>
        const COMPONENT_URL = 'https://ejjcjskseatjqdoxabhm.supabase.co';
        const COMPONENT_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqamNqc2tzZWF0anFkb3hhYmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjY0ODMsImV4cCI6MjA5NjQ0MjQ4M30.tCxYq9BWtU48m4mDI30Bf3-2temFzLW7qnpCG25nKBk';
        let edgeDatabaseDriver;
        let volatileStoreSettingsCache = null;

        const defaultVisualCache = [
            { title: "L'Obscurité Extrait", price: 14500, images: ["https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=800"] },
            { title: "Blanc Intense", price: 12000, images: ["https://images.unsplash.com/photo-1547887537-6158d64c35b3?q=80&w=800"] },
            { title: "Suede Saffron", price: 18000, images: ["https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=800"] }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // Unbind Native Elements and Hook Layout Control Routines
            document.getElementById('action-trigger-scroll').addEventListener('click', executeSmoothViewportScroll);
            document.getElementById('action-hero-discover').addEventListener('click', executeSmoothViewportScroll);
            
            document.getElementById('action-trigger-open-bag').addEventListener('click', () => toggleCartModalVisibility(true));
            document.getElementById('action-trigger-close-bag').addEventListener('click', () => toggleCartModalVisibility(false));
            
            document.getElementById('action-trigger-verify-pincode').addEventListener('click', validatePincodeLogisticsPayload);

            // Execute Immediate Hydration From Static Safe Arrays
            generateShowcaseMatrixCards(defaultVisualCache);
            
            // Spin Up Decoupled Asynchronous Database Drivers
            bootAsynchronousClientDriver();
        });

        function executeSmoothViewportScroll() {
            document.getElementById('target-shop-section').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleCartModalVisibility(forceOpenState) {
            const containerNode = document.getElementById('cart-vault-modal-element');
            if (forceOpenState) {
                containerNode.classList.add('state-visible');
            } else {
                containerNode.classList.remove('state-visible');
            }
        }

        function bootAsynchronousClientDriver() {
            if (window.supabase) {
                connectAndSyncCatalogPayload();
            } else {
                setTimeout(bootAsynchronousClientDriver, 50);
            }
        }

        async function connectAndSyncCatalogPayload() {
            try {
                edgeDatabaseDriver = window.supabase.createClient(COMPONENT_URL, COMPONENT_KEY);
                
                const { data: settingsMatrix } = await edgeDatabaseDriver.from('store_settings').select('*').single();
                if (settingsMatrix) volatileStoreSettingsCache = settingsMatrix;

                const { data: realTimeProducts, error } = await edgeDatabaseDriver.from('products').select('*').eq('is_archived', false);
                if (!error && realTimeProducts && realTimeProducts.length > 0) {
                    generateShowcaseMatrixCards(realTimeProducts);
                }
            } catch (err) {
                console.warn("Realtime streaming pipeline deferred. Serving memory-cached matrix.");
            }
        }

        function generateShowcaseMatrixCards(productDataArray) {
            const containerGrid = document.getElementById('dynamic-product-injection-grid');
            containerGrid.innerHTML = '';
            
            productDataArray.forEach(product => {
                const luxuryCardWrapper = document.createElement('div');
                luxuryCardWrapper.className = 'product-luxury-card';
                
                // Pure DOM Interactivity Routing Configuration
                luxuryCardWrapper.addEventListener('click', () => toggleCartModalVisibility(true));

                const fallbackMediaSource = product.images?.[0] || 'https://via.placeholder.com/400x460/111/fff?text=KAEL+HAUTE+PARFUMERIE';
                
                luxuryCardWrapper.innerHTML = `
                    <img src="${fallbackMediaSource}" class="product-luxury-card-frame" alt="${product.title}">
                    <div class="product-luxury-details">
                        <h3 class="product-luxury-title">${product.title}</h3>
                        <div class="product-luxury-price">₹${product.price.toLocaleString('en-IN')}</div>
                    </div>
                `;
                containerGrid.appendChild(luxuryCardWrapper);
            });
        }

        function validatePincodeLogisticsPayload() {
            const evaluationField = document.getElementById('target-routing-pincode');
            const interactionFeedbackNode = document.getElementById('ui-routing-feedback-node');
            const sanitizedPincodeString = evaluationField.value.trim();
            
            if (sanitizedPincodeString.length !== 6 || isNaN(sanitizedPincodeString)) { 
                interactionFeedbackNode.style.color = "#ef4444"; 
                interactionFeedbackNode.innerText = "ROUTING ERROR: REQUIRE 6-DIGIT FORMAT"; 
                return; 
            }

            const panIndiaExecutionFlag = volatileStoreSettingsCache ? volatileStoreSettingsCache.pan_india_delivery : true;
            const validWhitelistedPincodes = volatileStoreSettingsCache?.allowed_pincodes || [];

            if (panIndiaExecutionFlag || validWhitelistedPincodes.includes(sanitizedPincodeString)) {
                interactionFeedbackNode.style.color = "#10b981"; 
                interactionFeedbackNode.innerText = "✓ LOGISTICS CONFIRMED: REGION SERVICEABLE";
            } else {
                interactionFeedbackNode.style.color = "#ef4444"; 
                interactionFeedbackNode.innerText = "✕ DISTRIBUTION LOCKOUT: REGION NON-SERVICEABLE";
            }
        }
    </script>
</body>
</html>
