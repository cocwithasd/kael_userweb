<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAEL | Haute Parfumerie</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --surface: #111111; --text: #ffffff; --muted: #888888; --gold: #c5a059; --border: #222222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;}
        
        header { 
            position: fixed; top: 0; width: 100%; padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px); z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-logo { display: flex; align-items: center; justify-content: center; }
        .header-logo img { height: 22px; max-width: 160px; object-fit: contain; display: block; }
        
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links button { 
            background: none; border: none; color: var(--text); font-size: 0.75rem; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: color 0.3s;
        }
        .nav-links button:hover { color: var(--gold); }

        .hero { 
            height: 100vh; width: 100vw;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--bg)), url('https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=2000') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            padding: 0 20px;
        }
        .hero h1 { font-family: 'Times New Roman', serif; font-size: 4rem; font-weight: 300; letter-spacing: 8px; margin-bottom: 20px; text-transform: uppercase;}
        .hero p { font-size: 1rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 40px; max-width: 600px; line-height: 1.6;}
        .btn-gold { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            padding: 16px 40px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; 
            cursor: pointer; transition: 0.4s; text-decoration: none; display: inline-block;
        }
        .btn-gold:hover { background: var(--gold); color: #000; }

        .section-title { text-align: center; font-family: 'Times New Roman', serif; font-size: 2rem; font-weight: 300; letter-spacing: 4px; margin: 100px 0 50px; text-transform: uppercase;}
        .catalog-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; padding: 0 5% 100px; max-width: 1400px; margin: 0 auto;}
        .product-card { text-align: center; cursor: pointer; transition: transform 0.4s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 450px; background: var(--surface); object-fit: cover; border-radius: 4px; }
        .product-info { padding-top: 20px; }
        .product-title { font-size: 1rem; letter-spacing: 2px; font-weight: 400; margin-bottom: 8px; text-transform: uppercase; }
        .product-price { color: var(--gold); font-size: 0.9rem; }

        .bag-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; 
            opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(5px);
        }
        .bag-overlay.active { opacity: 1; pointer-events: auto; }
        .bag-panel { 
            position: absolute; right: -500px; top: 0; bottom: 0; width: 100%; max-width: 450px; 
            background: var(--surface); border-left: 1px solid var(--border); padding: 40px; 
            transition: right 0.4s ease-out; display: flex; flex-direction: column;
        }
        .bag-overlay.active .bag-panel { right: 0; }
        
        .bag-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px;}
        .bag-header h2 { font-family: 'Times New Roman', serif; font-size: 1.5rem; font-weight: 300; letter-spacing: 2px; text-transform: uppercase;}
        .close-btn { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; }
        
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .input-group input { width: 100%; padding: 15px; background: var(--bg); border: 1px solid var(--border); color: white; outline: none; border-radius: 4px; }
        .input-group input:focus { border-color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <div class="nav-links">
            <button id="nav-collections-trigger">Collections</button>
        </div>
        <a href="#" class="header-logo">
            <img src="https://ejjcjskseatjqdoxabhm.supabase.co/storage/v1/object/public/store-assets/KAEL-R-White.png" alt="KAEL">
        </a>
        <div class="nav-links">
            <button id="open-bag-btn">Bag (1)</button>
        </div>
    </header>

    <section class="hero">
        <h1>L'Obscurité</h1>
        <p>A daring exploration of smoked woods, midnight amber, and raw elegance.</p>
        <button id="hero-discover-btn" class="btn-gold">Discover Collection</button>
    </section>

    <h2 class="section-title" id="shop-section">Signature Scents</h2>
    <div class="catalog-container" id="product-grid"></div>

    <div class="bag-overlay" id="bag-modal">
        <div class="bag-panel">
            <div class="bag-header">
                <h2>Your Bag</h2>
                <button class="close-btn" id="close-bag-btn">✕</button>
            </div>
            
            <div style="flex: 1;">
                <p style="color: var(--muted); font-size: 0.9rem; margin-bottom: 30px;">Item: Signature Extrait De Parfum (100ml)</p>
                
                <div class="input-group">
                    <label>Pincode Verification</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="checkout-pin" placeholder="Enter 6-digit PIN" maxlength="6">
                        <button class="btn-gold" style="padding: 0 20px;" id="verify-pin-btn">Verify</button>
                    </div>
                    <div id="pin-status" style="margin-top: 10px; font-size: 0.8rem; font-weight: bold;"></div>
                </div>
            </div>

            <button class="btn-gold" style="width: 100%; background: var(--gold); color: black; font-weight: bold;">Proceed to Checkout</button>
        </div>
    </div>

    <script>
        let supabase;
        let configCache = null;

        const dummyProducts = [
            { title: "L'Obscurité", price: 14500, images: ["https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=800"] },
            { title: "Blanc Intense", price: 12000, images: ["https://images.unsplash.com/photo-1547887537-6158d64c35b3?q=80&w=800"] },
            { title: "Suede Saffron", price: 18000, images: ["https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=800"] }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // Setup static UI bindings immediately
            document.getElementById('open-bag-btn').addEventListener('click', () => {
                document.getElementById('bag-modal').classList.add('active');
            });
            document.getElementById('close-bag-btn').addEventListener('click', () => {
                document.getElementById('bag-modal').classList.remove('active');
            });
            document.getElementById('nav-collections-trigger').addEventListener('click', () => {
                document.getElementById('shop-section').scrollIntoView();
            });
            document.getElementById('hero-discover-btn').addEventListener('click', () => {
                document.getElementById('shop-section').scrollIntoView();
            });
            document.getElementById('verify-pin-btn').addEventListener('click', verifyPin);

            // Safe init check for Supabase
            if (window.supabase) {
                initStore();
            } else {
                let interval = setInterval(() => {
                    if (window.supabase) {
                        clearInterval(interval);
                        initStore();
                    }
                }, 100);
            }
        });

        async function initStore() {
            try {
                supabase = window.supabase.createClient('https://ejjcjskseatjqdoxabhm.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqamNqc2tzZWF0anFkb3hhYmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjY0ODMsImV4cCI6MjA5NjQ0MjQ4M30.tCxYq9BWtU48m4mDI30Bf3-2temFzLW7qnpCG25nKBk');
                
                const { data: settings } = await supabase.from('store_settings').select('*').single();
                if (settings) configCache = settings;

                const { data: products } = await supabase.from('products').select('*').eq('is_archived', false);
                const itemsToRender = (products && products.length > 0) ? products : dummyProducts;
                
                document.getElementById('product-grid').innerHTML = itemsToRender.map(p => `
                    <div class="product-card" onclick="document.getElementById('bag-modal').classList.add('active')">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/400x400/111/fff?text=KAEL'}" class="product-img" alt="${p.title}">
                        <div class="product-info">
                            <h3 class="product-title">${p.title}</h3>
                            <div class="product-price">₹${p.price.toLocaleString('en-IN')}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Graceful fallback applied:", err);
            }
        }

        function verifyPin() {
            const pin = document.getElementById('checkout-pin').value.trim();
            const status = document.getElementById('pin-status');
            
            if(pin.length !== 6) { status.style.color = "#ef4444"; status.innerText = "Enter valid 6-digit PIN"; return; }

            const isPanIndia = configCache ? configCache.pan_india_delivery : true;
            const validPins = configCache?.allowed_pincodes || [];

            if(isPanIndia || validPins.includes(pin)) {
                status.style.color = "#10b981"; status.innerText = "✓ Delivery Available";
            } else {
                status.style.color = "#ef4444"; status.innerText = "✕ Location Not Serviceable";
            }
        }
    </script>
</body>
</html>
