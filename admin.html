<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAEL | Admin Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: monospace; background-color: #000; color: #fff; }
    </style>
</head>
<body class="p-8">

    <div id="login-view" class="max-w-md mx-auto mt-32 p-8 border border-white/10 bg-[#0a0a0a]">
        <h1 class="text-2xl font-bold mb-2">SYSTEM ACCESS</h1>
        <p class="text-gray-500 text-xs mb-8">Admin Level Clearance Required</p>
        
        <!-- Error Display Box -->
        <div id="admin-error" class="hidden bg-red-500/10 border border-red-500/50 text-red-500 text-[10px] uppercase tracking-widest p-4 mb-6"></div>

        <input type="email" id="email" placeholder="Admin Email" class="w-full bg-[#111] border border-white/10 p-3 mb-4 text-sm focus:outline-none focus:border-amber-500">
        <input type="password" id="password" placeholder="Password" class="w-full bg-[#111] border border-white/10 p-3 mb-6 text-sm focus:outline-none focus:border-amber-500">
        <button id="auth-btn" onclick="loginAdmin()" class="w-full bg-white text-black py-3 font-bold text-xs tracking-widest hover:bg-amber-500 transition-colors">AUTHENTICATE</button>
    </div>

    <div id="dashboard-view" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-end border-b border-white/10 pb-6 mb-10">
            <div>
                <h1 class="text-3xl font-bold text-amber-500">KAEL CONTROL CENTER</h1>
                <p id="admin-email" class="text-gray-500 text-xs mt-2"></p>
            </div>
            <button onclick="logoutAdmin()" class="text-xs tracking-widest border border-white/20 px-4 py-2 hover:bg-red-500 hover:text-white transition-colors">TERMINATE SESSION</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <!-- STORE CONFIGURATION PANEL -->
            <div class="bg-[#0a0a0a] p-6 border border-white/10">
                <h2 class="text-lg font-bold mb-6 border-b border-white/10 pb-4">Global Configuration</h2>
                
                <div class="space-y-4 mb-8">
                    <h3 class="text-xs text-gray-500 uppercase tracking-widest">Contact Infrastructure</h3>
                    <input type="text" id="conf-email" placeholder="Support Email" class="w-full bg-[#111] border border-white/10 p-2 text-xs">
                    <input type="text" id="conf-phone" placeholder="Support Phone" class="w-full bg-[#111] border border-white/10 p-2 text-xs">
                </div>

                <div class="space-y-4 mb-8">
                    <h3 class="text-xs text-gray-500 uppercase tracking-widest">Logistics (Serviceable Pincodes)</h3>
                    <div class="flex items-center space-x-2 mb-2">
                        <input type="checkbox" id="conf-allow-all" class="accent-amber-500 w-4 h-4">
                        <label class="text-xs">Allow All India Delivery</label>
                    </div>
                    <textarea id="conf-pins" rows="2" placeholder="Comma separated pins (e.g. 721101, 700001)" class="w-full bg-[#111] border border-white/10 p-2 text-xs"></textarea>
                </div>

                <button onclick="saveStoreConfig()" class="w-full bg-white text-black py-2 text-xs font-bold hover:bg-amber-500 tracking-widest">SYNC CONFIGURATION</button>
            </div>

            <!-- PAYMENT GATEWAY PANEL -->
            <div class="bg-[#0a0a0a] p-6 border border-amber-500/30">
                <h2 class="text-lg font-bold text-amber-500 mb-6 border-b border-white/10 pb-4">Razorpay Gateway</h2>
                
                <div class="flex items-center space-x-2 mb-6 p-4 bg-amber-500/10 border border-amber-500/20">
                    <input type="checkbox" id="rzp-enable" class="accent-amber-500 w-5 h-5">
                    <label class="text-sm font-bold text-white tracking-widest uppercase">Enable Online Payments</label>
                </div>

                <div class="space-y-4 mb-8">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1 uppercase tracking-widest">Key ID (Public)</label>
                        <input type="text" id="rzp-key" class="w-full bg-[#111] border border-white/10 p-2 text-xs">
                    </div>
                    <div>
                        <label class="text-xs text-red-400 block mb-1 uppercase tracking-widest">Key Secret (Classified)</label>
                        <input type="password" id="rzp-secret" class="w-full bg-[#111] border border-red-500/30 p-2 text-xs text-amber-400">
                    </div>
                </div>

                <button onclick="saveRazorpayConfig()" class="w-full bg-amber-500 text-black py-2 text-xs font-bold hover:bg-amber-400 tracking-widest">UPDATE PAYMENT CREDENTIALS</button>
            </div>
            
        </div>

        <!-- RECENT ORDERS PANEL -->
        <div class="mt-12 bg-[#0a0a0a] p-6 border border-white/10">
            <h2 class="text-lg font-bold mb-6 border-b border-white/10 pb-4">Recent Fulfillment Intel</h2>
            <div id="orders-container" class="space-y-2">
                <!-- Orders inject here -->
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = "https://ejjcjskseatjqdoxabhm.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqamNqc2tzZWF0anFkb3hhYmhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjY0ODMsImV4cCI6MjA5NjQ0MjQ4M30.tCxYq9BWtU48m4mDI30Bf3-2temFzLW7qnpCG25nKBk";
        
        // FIXED: Renamed to supabaseClient to prevent collision with CDN globals
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showError(message) {
            const box = document.getElementById('admin-error');
            box.innerText = message;
            box.classList.remove('hidden');
        }

        async function initAdmin() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(!session) return;

            // Verify Admin Role
            const { data: profile, error } = await supabaseClient.from('profiles').select('role').eq('id', session.user.id).single();
            
            if(error || !profile || profile.role !== 'admin') {
                showError("ACCESS DENIED: ACCOUNT LACKS ADMIN CLEARANCE.");
                await supabaseClient.auth.signOut();
                return;
            }

            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('admin-email').innerText = session.user.email;

            loadAdminData();
        }

        async function loginAdmin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('auth-btn');
            
            document.getElementById('admin-error').classList.add('hidden');
            
            if(!email || !password) return showError("CREDENTIALS MISSING.");
            
            btn.innerText = "AUTHENTICATING...";
            btn.disabled = true;

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if(error) throw error;
                await initAdmin();
            } catch(e) {
                showError(e.message);
            } finally {
                btn.innerText = "AUTHENTICATE";
                btn.disabled = false;
            }
        }

        async function logoutAdmin() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        async function loadAdminData() {
            // Load Public Config
            const { data: config } = await supabaseClient.from('store_settings').select('*').eq('id', 1).single();
            if(config) {
                document.getElementById('conf-email').value = config.support_email || '';
                document.getElementById('conf-phone').value = config.support_phone || '';
                document.getElementById('conf-allow-all').checked = config.allow_all_pins;
                document.getElementById('conf-pins').value = config.allowed_pins?.join(', ') || '';
                
                document.getElementById('rzp-enable').checked = config.razorpay_enabled;
                document.getElementById('rzp-key').value = config.razorpay_key_id || '';
            }

            // Load Secure Razorpay Secret
            const { data: secure } = await supabaseClient.from('secure_settings').select('razorpay_key_secret').eq('id', 1).maybeSingle();
            if(secure) document.getElementById('rzp-secret').value = secure.razorpay_key_secret || '';

            // Load Orders
            const { data: orders } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false }).limit(20);
            const container = document.getElementById('orders-container');
            container.innerHTML = '';
            
            if(!orders || orders.length === 0) {
                container.innerHTML = `<p class="text-xs text-gray-500">No fulfillment data found.</p>`;
                return;
            }

            orders.forEach(o => {
                container.innerHTML += `
                    <div class="flex justify-between items-center p-4 border border-white/5 hover:bg-white/5">
                        <div>
                            <span class="text-white font-bold">#${o.id.substring(0,8)}</span> 
                            <span class="text-gray-500 ml-3 text-xs uppercase">${o.customer_name}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-amber-500 mr-4 font-bold">₹${o.total_amount}</span>
                            <span class="bg-[#111] px-2 py-1 text-[9px] uppercase tracking-widest">${o.payment_method}</span>
                            <span class="${o.order_status === 'Pending' ? 'bg-amber-500 text-black' : 'bg-white/10 text-white'} px-2 py-1 text-[9px] uppercase tracking-widest ml-2 font-bold">${o.order_status}</span>
                        </div>
                    </div>
                `;
            });
        }

        async function saveStoreConfig() {
            const pins = document.getElementById('conf-pins').value.split(',').map(p => p.trim()).filter(p => p);
            await supabaseClient.from('store_settings').update({
                support_email: document.getElementById('conf-email').value,
                support_phone: document.getElementById('conf-phone').value,
                allow_all_pins: document.getElementById('conf-allow-all').checked,
                allowed_pins: pins
            }).eq('id', 1);
            alert("Configuration Synced.");
        }

        async function saveRazorpayConfig() {
            // Save public parts
            await supabaseClient.from('store_settings').update({
                razorpay_enabled: document.getElementById('rzp-enable').checked,
                razorpay_key_id: document.getElementById('rzp-key').value
            }).eq('id', 1);

            // Save classified secret
            const secret = document.getElementById('rzp-secret').value;
            if(secret && secret.length > 5) {
                await supabaseClient.from('secure_settings').upsert({ id: 1, razorpay_key_secret: secret });
            }
            alert("Payment Strategy Updated.");
        }

        initAdmin();
    </script>
</body>
</html>
